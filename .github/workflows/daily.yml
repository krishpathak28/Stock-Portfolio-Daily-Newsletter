name: Daily Portfolio Briefing

# Two ways to run:
#   1. schedule  -- the daily cron below (weekdays; markets are closed weekends)
#   2. workflow_dispatch -- a manual "Run workflow" button in the Actions tab,
#      which is how you'll test the first few real runs before trusting the cron.
#
# TIMING: 5:00 PM America/New_York, weekdays -- one hour after the closing bell.
# That buffer matters: earnings drop between 4:05 and 4:30 PM ET, and the
# coverage explaining a move lands in the 20-40 min after. Running at 5:00
# means the "why" actually exists for the web-search step to find.
#
# GitHub cron is ALWAYS UTC and does NOT observe daylight saving, so a single
# fixed cron drifts by an hour twice a year. Fix: schedule BOTH possible UTC
# times and let the `gate` job below check real New York time and allow only
# the correct one through. The other shows up as a skipped (grey) job.
on:
  schedule:
    - cron: "0 21 * * 1-5"  # 5:00 PM ET while EDT (mid-Mar - early Nov)
    - cron: "0 22 * * 1-5"  # 5:00 PM ET while EST (early Nov - mid-Mar)
  workflow_dispatch: {}

jobs:
  # Decides whether this particular trigger should actually run. Manual runs
  # always pass; scheduled runs pass only when it's really 5 PM in New York.
  gate:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Manual run -- proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=America/New_York date +%H)
          if [ "$HOUR" = "17" ]; then
            echo "New York hour is $HOUR -- correct cron for the current DST state. Proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "New York hour is $HOUR, not 17 -- this is the off-season duplicate cron. Skipping."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  send-briefing:
    needs: gate
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Write portfolio.json from secret
        # This repo is PUBLIC, so real holdings are never committed (portfolio.json
        # is gitignored; portfolio.example.json documents the schema). The real
        # file is materialised here, at run time, from an encrypted secret and
        # exists only for the life of this job.
        env:
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON }}
        run: |
          if [ -z "$PORTFOLIO_JSON" ]; then
            echo "ERROR: PORTFOLIO_JSON secret is not set." >&2
            echo "Add it under Settings > Secrets and variables > Actions." >&2
            exit 1
          fi
          printf '%s' "$PORTFOLIO_JSON" > portfolio.json
          # Validate it parses, and print ONLY a count -- never ticker names,
          # because Actions logs on a public repo are publicly readable.
          python3 -c "import json,sys; d=json.load(open('portfolio.json')); n=len(d['holdings']); print('portfolio.json OK:', n, 'holdings'); sys.exit(0 if n else 1)"

      - name: Build the container image
        run: docker build -t portfolio-newsletter .

      - name: Run the pipeline
        # Secrets are injected as env vars at run time -- never baked into the
        # image. Configure these under: repo Settings > Secrets and variables >
        # Actions > Repository secrets.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY \
            -e TAVILY_API_KEY \
            -e RESEND_API_KEY \
            -e RECIPIENT_EMAIL \
            portfolio-newsletter
